name: 'GitHub Release'

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version for the release (e.g. 1.2.3)'
        required: false
        type: string

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: open-resource-discovery/github-release@fix/contributor-deduplication
        with:
          tag-template: "v/<version>"
          version: ${{ inputs.version }}